---
# Sample manifest for deploying the prometheus-libvirt-exporter as a DaemonSet in Kubernetes.
# The ServiceMonitor allows auto-discovery and metric scraping with the Prometheus Operator.
# Update `image` tag `<version>` to the desired version and modify `namespace` and `nodeSelector` based on cluster setup.
#
# A note on readiness and liveness probes and the use of hostPath types:
#
#  The below sample shows the use of hostPath Socket type for the libvirt socket file.
#  This is the recommended approach to avoid exposing the entire /var/run/libvirt directory.
#  When the exporter runs with a hostPath Socket type, the readiness and liveness probes fail if the socket file is deleted and recreated.
#  The socket mount becomes stale (inode change) and the exporter cannot connect to libvirt, causing the probes to fail and the pod to be restarted (livenessProbe).
#  This can happen during certain operations on the host, for example when the libvirt socket is managed by a separate pod (e.g. nova-compute) that restarts.
#
#  When using hostPath Directory type, the exporter can auto-recover when a libvirt socket file is deleted and recreated.
#  But this exposes the entire /var/run/libvirt directory, which is not recommended for security reasons.
#  When using subPath on the volume mount, the same issue occurs as with the Socket type, so it is not recommended.
#
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prometheus-libvirt-exporter
  namespace: my-namespace
  labels:
    app: prometheus-libvirt-exporter
spec:
  selector:
    matchLabels:
      app: prometheus-libvirt-exporter
  template:
    metadata:
      labels:
        app: prometheus-libvirt-exporter
    spec:
      nodeSelector:
        my.label/hypervisor: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: prometheus-libvirt-exporter
          image: ghcr.io/inovex/prometheus-libvirt-exporter:<version>
          command: ["usr/bin/prometheus-libvirt-exporter"]
          args:
            - --web.health-path=/health
          ports:
            - name: metrics
              containerPort: 9177
              protocol: TCP
          volumeMounts:
            - name: libvirt-sock
              mountPath: /var/run/libvirt/libvirt-sock-ro
          # Use readinessProbe to check if the exporter can connect to libvirt. Unlike livenessProbe, it does not restart the pod on failure.
          # Use this with hostPath type Directory (exporter auto-recovers).
          readinessProbe:
            httpGet:
              path: /health
              port: 9177
            initialDelaySeconds: 10
            periodSeconds: 30
          # Use livenessProbe to restart the pod if the exporter cannot connect to libvirt.
          # Use this with hostPath type Socket (stale mount requires pod restart).
          # Remove this with hostPath type Directory, as the exporter auto-recovers without a pod restart.
          livenessProbe:
            httpGet:
              path: /health
              port: 9177
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: libvirt-sock
          hostPath:
            path: /var/run/libvirt/libvirt-sock-ro
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-libvirt-exporter
  namespace: my-namespace
  labels:
    app: prometheus-libvirt-exporter
spec:
  clusterIP: None
  selector:
    app: prometheus-libvirt-exporter
  ports:
    - name: metrics
      port: 9177
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-libvirt-exporter
  namespace: my-namespace
  labels:
    app: prometheus-libvirt-exporter
spec:
  selector:
    matchLabels:
      app: prometheus-libvirt-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: instance
